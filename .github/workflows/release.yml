name: Build and Release Binaries

# Tagged pushes (e.g. v1.2.1) build binaries with -ldflags version=v1.2.1 and create a GitHub Release.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.os }} - ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          # Linux builds
          - os: linux
            arch: amd64
            runner: ubuntu-latest
            output: cf-knife-linux-amd64
          - os: linux
            arch: arm64
            runner: ubuntu-latest
            output: cf-knife-linux-arm64
          - os: linux
            arch: 386
            runner: ubuntu-latest
            output: cf-knife-linux-386
          
          # macOS builds
          - os: darwin
            arch: amd64
            runner: macos-latest
            output: cf-knife-darwin-amd64
          - os: darwin
            arch: arm64
            runner: macos-latest
            output: cf-knife-darwin-arm64
          
          # Windows builds
          - os: windows
            arch: amd64
            runner: windows-latest
            output: cf-knife-windows-amd64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build binary
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          VERSION: ${{ github.ref_type == 'tag' && github.ref_name || 'dev' }}
        run: |
          mkdir -p build
          go build -ldflags="-s -w -X cf-knife/cmd.Version=${VERSION}" -o build/${{ matrix.output }} .
        shell: bash

      - name: Smoke test (native builds only)
        if: matrix.os == 'linux' && matrix.arch == 'amd64' || matrix.os == 'windows' && matrix.arch == 'amd64' || matrix.os == 'darwin'
        run: |
          echo "--- version ---"
          ./build/${{ matrix.output }} --version
          echo "--- version/help ---"
          ./build/${{ matrix.output }} --help
          echo "--- scan help ---"
          ./build/${{ matrix.output }} scan --help
          echo "--- quick scan (1 IP, tcp-only, 1 thread, 5s timeout) ---"
          ./build/${{ matrix.output }} scan --ips "1.1.1.1" --port 443 --mode tcp-only --threads 1 --timing 0 --timeout 5s --progress=false 2>&1 || true
          echo "--- smoke test passed ---"
        shell: bash

      - name: Create checksums
        run: |
          cd build
          if command -v sha256sum &>/dev/null; then
            sha256sum ${{ matrix.output }} > ${{ matrix.output }}.sha256
          else
            certutil -hashfile ${{ matrix.output }} SHA256 | head -2 | tail -1 | tr -d ' ' > ${{ matrix.output }}.sha256
            echo "  ${{ matrix.output }}" >> ${{ matrix.output }}.sha256
          fi
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: build/${{ matrix.output }}
          retention-days: 30

      - name: Upload checksum
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}.sha256
          path: build/${{ matrix.output }}.sha256
          retention-days: 30

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -type f -exec mv {} release/ \;

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: Build Notification
    runs-on: ubuntu-latest
    needs: build
    if: always()
    steps:
      - name: Check build status
        run: |
          if [ "${{ needs.build.result }}" == "success" ]; then
            echo "✅ All binaries built successfully!"
          else
            echo "❌ Build failed!"
            exit 1
          fi

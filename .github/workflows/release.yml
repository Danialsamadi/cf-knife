name: Build and Release Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.os }} - ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          # Linux builds
          - os: linux
            arch: amd64
            runner: ubuntu-latest
            output: cf-knife-linux-amd64
          - os: linux
            arch: arm64
            runner: ubuntu-latest
            output: cf-knife-linux-arm64
          - os: linux
            arch: 386
            runner: ubuntu-latest
            output: cf-knife-linux-386
          
          # macOS builds
          - os: darwin
            arch: amd64
            runner: macos-latest
            output: cf-knife-darwin-amd64
          - os: darwin
            arch: arm64
            runner: macos-latest
            output: cf-knife-darwin-arm64
          
          # Windows builds
          - os: windows
            arch: amd64
            runner: windows-latest
            output: cf-knife-windows-amd64.exe
          - os: windows
            arch: 386
            runner: windows-latest
            output: cf-knife-windows-386.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build binary
        run: |
          mkdir -p build
          CGO_ENABLED=0 GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} go build \
            -ldflags="-s -w" \
            -o build/${{ matrix.output }} .
        shell: bash

      - name: Create checksums
        run: |
          cd build
          sha256sum ${{ matrix.output }} > ${{ matrix.output }}.sha256
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: build/${{ matrix.output }}
          retention-days: 30

      - name: Upload checksum
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}.sha256
          path: build/${{ matrix.output }}.sha256
          retention-days: 30

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -type f -exec mv {} release/ \;

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate release notes
        run: |
          echo "Release artifacts:" >> release_notes.md
          echo "" >> release_notes.md
          ls -lh release/ | tail -n +2 | awk '{print "- " $9 " (" $5 ")"}' >> release_notes.md
          cat release_notes.md

  notify:
    name: Build Notification
    runs-on: ubuntu-latest
    needs: build
    if: always()
    steps:
      - name: Check build status
        run: |
          if [ "${{ needs.build.result }}" == "success" ]; then
            echo "✅ All binaries built successfully!"
          else
            echo "❌ Build failed!"
            exit 1
          fi
